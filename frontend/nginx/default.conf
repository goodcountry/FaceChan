# Nginx config for the React build container.
# Serves static files and falls back to index.html for client-side routing.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # All routes fall back to index.html so React Router handles them.
    # index.html itself must NEVER be cached — it's the only thing that
    # references the current content-hashed asset filenames. A cached
    # stale index.html will keep loading an old JS/CSS bundle against a
    # freshly deployed backend, which is exactly the kind of "it works on
    # the server but not in the browser" bug that's hard to diagnose from
    # logs alone.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Cache built assets aggressively (Vite content-hashes filenames, so a
    # changed file always gets a new URL — safe to cache forever)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker must never be cached — browser checks for updates on
    # every navigation; a cached SW would silently serve stale assets after
    # a deploy. Same rule applies to the Vite-generated manifest.webmanifest.
    location ~* (sw\.js|workbox-.*\.js|manifest\.webmanifest)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }
}
