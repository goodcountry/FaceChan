# Production — self-hosted (Tor onion instance).
# Full stack: Django (Gunicorn) + Postgres + React (pre-built) + Nginx + Tor v3.
#
# Prerequisites:
#   1. Copy .env.example to .env — set SECRET_KEY and POSTGRES_PASSWORD at minimum.
#   2. docker compose -f docker-compose.prod.yml up -d --build
#
# Your .onion address appears in the tor container logs on first run:
#   docker compose -f docker-compose.prod.yml logs tor

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-facechan}
      POSTGRES_USER: ${POSTGRES_USER:-facechan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-facechan}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DATABASE_URL: postgres://${POSTGRES_USER:-facechan}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-facechan}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      MEDIA_ROOT: /app/media
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
      FEDERATION_BASE_URL: ${FEDERATION_BASE_URL:-}
      FEDERATION_SOCKS_PROXY: ${FEDERATION_SOCKS_PROXY:-socks5h://tor-proxy:9150}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - internal

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    command: celery -A facechan worker --loglevel=info
    volumes:
      - media_data:/app/media
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DATABASE_URL: postgres://${POSTGRES_USER:-facechan}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-facechan}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      FEDERATION_BASE_URL: ${FEDERATION_BASE_URL:-}
      FEDERATION_SOCKS_PROXY: ${FEDERATION_SOCKS_PROXY:-socks5h://tor-proxy:9150}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal

  celerybeat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    command: celery -A facechan beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DATABASE_URL: postgres://${POSTGRES_USER:-facechan}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-facechan}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      FEDERATION_BASE_URL: ${FEDERATION_BASE_URL:-}
      FEDERATION_SOCKS_PROXY: ${FEDERATION_SOCKS_PROXY:-socks5h://tor-proxy:9150}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal

  # Builds React and serves the compiled files via its own Nginx on port 80 (internal only)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
    restart: always
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: always
    # Internal-only by default — correct for onion deployments and lets multiple
    # onion instances run on one machine without port conflicts.
    #
    # CLEARNET DEPLOYMENTS: you must expose this to the host, or the public
    # internet (and Certbot's HTTP challenge) cannot reach nginx. Do this with
    # an override file rather than editing this file directly:
    #
    #   docker-compose.clearnet-port.yml:
    #     services:
    #       nginx:
    #         ports:
    #           - "80:80"
    #
    #   docker compose -f docker-compose.prod.yml -f docker-compose.clearnet-port.yml -p <name> up -d
    #
    # See DEPLOYMENT_CLEARNET.md for the full clearnet setup.
    expose:
      - "80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    depends_on:
      - web
      - frontend
    networks:
      - internal

  tor:
    image: goldy/tor-hidden-service:latest
    restart: always
    links:
      - nginx
    environment:
      # Prefix before _TOR_SERVICE_HOSTS is just a label — can be anything
      FACECHAN_TOR_SERVICE_HOSTS: "80:nginx:80"
      FACECHAN_TOR_SERVICE_VERSION: "3"
    volumes:
      - tor_keys:/var/lib/tor/hidden_service/
    networks:
      - internal

  # Dedicated OUTBOUND Tor SOCKS proxy for delivering to .onion instances.
  # Separate from the inbound hidden-service 'tor' container above.
  #
  # Uses peterdavehello/tor-socks-proxy, not dperson/torproxy. The latter
  # was found running a multi-year-stale Tor binary (0.4.3.5) with a long,
  # still-open history of getting permanently stuck at "Bootstrapped 30%:
  # Loading networkstatus consensus" (see github.com/dperson/torproxy
  # issues #35, #47, #87) — this is a known bug in that image, not a
  # network/VPN/ISP problem, confirmed by direct comparison against the
  # 'tor' container above (much newer Tor version, bootstraps in seconds).
  # peterdavehello/tor-socks-proxy is actively maintained via Renovate
  # (automated Tor version bumps) and is SOCKS5-only, which is all
  # FEDERATION_SOCKS_PROXY actually needs — no bundled Privoxy/HTTP layer.
  # Listens on 9150, not 9050 — see FEDERATION_SOCKS_PROXY below.
  tor-proxy:
    image: peterdavehello/tor-socks-proxy:latest
    restart: always
    # Override the image's built-in healthcheck. History of getting this
    # wrong, in order, worth keeping so it isn't repeated:
    #  1. Image's own default: curl --fail against Facebook's onion.
    #     A real HTTP/2 500 FROM Facebook's own servers (confirmed by
    #     hand — legitimate Meta debug headers came back) still counts
    #     as failure under --fail, even though the proxy reached them
    #     fine. Wrong target to be picky about status code with.
    #  2. Tried check.torproject.org/api/ip instead — has its own
    #     documented history of intermittent breakage (Tor Project
    #     forum, Jan 2024), so this just traded one flaky external
    #     dependency for another.
    #  3. Tried a pure local port probe via `curl telnet://localhost:9150`.
    #     Wrong tool: --connect-timeout only bounds the TCP connect
    #     phase — once connected, curl's telnet client sits waiting for
    #     a server banner that a SOCKS5 port never sends, so it just
    #     hangs until Docker's own healthcheck timeout kills it. Passed
    #     in a quick sandbox test only because that test's dummy
    #     listener closed the connection immediately after accept,
    #     which isn't how a real, working SOCKS port behaves.
    #  4. Tried `nc -z` (the textbook right tool for a zero-I/O port
    #     probe) — this build's nc didn't behave as expected against a
    #     working Tor SocksPort either.
    # Landed on: same real request as (1), same target, just without
    # --fail. curl's own exit code already reflects genuine transport
    # success/failure regardless of HTTP status — 0 whenever a response
    # (any status) comes back, 7/28/etc. only on a real connection
    # failure. Verified directly against a local server returning 500:
    # exit 0 without --fail, exit 22 with it.
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null --connect-timeout 10 --socks5-hostname localhost:9150 'https://www.facebookwkhpilnemxj7asaniu7vnjjbiltxjqhye3mhbshg7kx5tfyd.onion/' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  media_data:
  static_data:
  tor_keys:    # Persists your .onion key — back this up!
