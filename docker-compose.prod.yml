# Production — self-hosted (Tor onion instance).
# Full stack: Django (Gunicorn) + Postgres + React (pre-built) + Nginx + Tor v3.
#
# Prerequisites:
#   1. Copy .env.example to .env — set SECRET_KEY and POSTGRES_PASSWORD at minimum.
#   2. docker compose -f docker-compose.prod.yml up -d --build
#
# Your .onion address appears in the tor container logs on first run:
#   docker compose -f docker-compose.prod.yml logs tor

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-facechan}
      POSTGRES_USER: ${POSTGRES_USER:-facechan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-facechan}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DATABASE_URL: postgres://${POSTGRES_USER:-facechan}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-facechan}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      MEDIA_ROOT: /app/media
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
      FEDERATION_BASE_URL: ${FEDERATION_BASE_URL:-}
      FEDERATION_SOCKS_PROXY: ${FEDERATION_SOCKS_PROXY:-socks5h://tor-proxy:9050}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - internal

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    command: celery -A facechan worker --loglevel=info
    volumes:
      - media_data:/app/media
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DATABASE_URL: postgres://${POSTGRES_USER:-facechan}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-facechan}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      FEDERATION_BASE_URL: ${FEDERATION_BASE_URL:-}
      FEDERATION_SOCKS_PROXY: ${FEDERATION_SOCKS_PROXY:-socks5h://tor-proxy:9050}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal

  celerybeat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    command: celery -A facechan beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DATABASE_URL: postgres://${POSTGRES_USER:-facechan}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-facechan}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      FEDERATION_BASE_URL: ${FEDERATION_BASE_URL:-}
      FEDERATION_SOCKS_PROXY: ${FEDERATION_SOCKS_PROXY:-socks5h://tor-proxy:9050}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal

  # Builds React and serves the compiled files via its own Nginx on port 80 (internal only)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
    restart: always
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: always
    # Internal-only by default — correct for onion deployments and lets multiple
    # onion instances run on one machine without port conflicts.
    #
    # CLEARNET DEPLOYMENTS: you must expose this to the host, or the public
    # internet (and Certbot's HTTP challenge) cannot reach nginx. Do this with
    # an override file rather than editing this file directly:
    #
    #   docker-compose.clearnet-port.yml:
    #     services:
    #       nginx:
    #         ports:
    #           - "80:80"
    #
    #   docker compose -f docker-compose.prod.yml -f docker-compose.clearnet-port.yml -p <name> up -d
    #
    # See DEPLOYMENT_CLEARNET.md for the full clearnet setup.
    expose:
      - "80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    depends_on:
      - web
      - frontend
    networks:
      - internal

  tor:
    image: goldy/tor-hidden-service:latest
    restart: always
    links:
      - nginx
    environment:
      # Prefix before _TOR_SERVICE_HOSTS is just a label — can be anything
      FACECHAN_TOR_SERVICE_HOSTS: "80:nginx:80"
      FACECHAN_TOR_SERVICE_VERSION: "3"
    volumes:
      - tor_keys:/var/lib/tor/hidden_service/
    networks:
      - internal

  # Dedicated OUTBOUND Tor SOCKS proxy for delivering to .onion instances.
  # Separate from the inbound hidden-service 'tor' container above.
  tor-proxy:
    image: dperson/torproxy:latest
    restart: always
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  media_data:
  static_data:
  tor_keys:    # Persists your .onion key — back this up!
