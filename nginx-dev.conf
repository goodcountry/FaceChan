# Dev nginx — proxies localhost:80 to the Vite dev server on port 5173.
# Hot reload (HMR) websocket is preserved via the Upgrade/Connection headers.
server {
    listen 80;
    server_name localhost;

    # Use Docker's internal DNS resolver — allows dynamic re-resolution
    # so nginx doesn't hard-fail if 'web' isn't registered at startup yet.
    resolver 127.0.0.11 valid=5s;

    # Django API — proxy to web container, pass real client IP
    location /api/ {
        set $upstream_web http://web:8000;
        proxy_pass $upstream_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django admin
    location /admin/ {
        set $upstream_web http://web:8000;
        proxy_pass $upstream_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Media uploads
    location /media/ {
        set $upstream_web http://web:8000;
        proxy_pass $upstream_web;
        proxy_set_header Host $host;
    }

    # Vite HMR websocket
    location /_vite/ {
        set $upstream_frontend http://frontend:5173;
        proxy_pass $upstream_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Everything else → Vite dev server
    location / {
        set $upstream_frontend http://frontend:5173;
        proxy_pass $upstream_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
