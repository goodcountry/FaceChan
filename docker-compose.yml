# Local development — Django + Postgres + React (Vite dev server).
# Hot reload works for both backend and frontend.
#
# Usage:
#   docker compose up --build
#
# Then visit:
#   Frontend:   http://localhost  (nginx on port 80 → Vite on 5173)
#   API:        http://localhost:8000
#   Admin:      http://localhost:8000/admin
#
# On a fresh DB the seed command runs automatically and creates:
#   - 10 boards with 100 threads each
#   - Founder account: KINO / changeme  ← change this password!

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: facechan
      POSTGRES_USER: facechan
      POSTGRES_PASSWORD: facechan_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U facechan"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed --threads 100 --max-replies 40 &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    environment:
      DEBUG: "True"
      SECRET_KEY: "dev-secret-not-for-production"
      DATABASE_URL: "postgres://facechan:facechan_dev@db:5432/facechan"
      ALLOWED_HOSTS: "localhost,127.0.0.1,web,.ngrok-free.app"
      REDIS_URL: "redis://redis:6379/1"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/boards/')\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A facechan worker --loglevel=info
    volumes:
      - .:/app
      - media_data:/app/media
    environment:
      DEBUG: "True"
      SECRET_KEY: "dev-secret-not-for-production"
      DATABASE_URL: "postgres://facechan:facechan_dev@db:5432/facechan"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      ALLOWED_HOSTS: "localhost,127.0.0.1,web,.ngrok-free.app"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celerybeat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A facechan beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    environment:
      DEBUG: "True"
      SECRET_KEY: "dev-secret-not-for-production"
      DATABASE_URL: "postgres://facechan:facechan_dev@db:5432/facechan"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      ALLOWED_HOSTS: "localhost,127.0.0.1,web,.ngrok-free.app"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules    # keep container node_modules isolated from host
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://web:8000"
    depends_on:
      - web

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx-dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
