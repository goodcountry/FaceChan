# Nginx reverse proxy for FaceChan production.
#
# Uses variables for upstream hostnames so Nginx resolves them lazily at
# request time rather than at startup — prevents "host not found" crashes
# when Django or the frontend container isn't ready yet.

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # Docker's internal DNS resolver — required for lazy upstream resolution
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    # Django REST API
    location /api/ {
        set $django web:8000;
        proxy_pass http://$django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }

    # ActivityPub endpoints — board/user actors, inboxes, outboxes,
    # /ap/instance discovery. MUST proxy to Django, not fall through to the
    # React catch-all (which would return index.html and break federation).
    location /ap/ {
        set $django web:8000;
        proxy_pass http://$django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }

    # Webfinger — actor handle resolution for federation discovery.
    location /.well-known/ {
        set $django web:8000;
        proxy_pass http://$django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }

    # WebSocket — Django Channels
    location /ws/ {
        set $django web:8000;
        proxy_pass http://$django;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;  # keep WS connections alive for up to 24h
        proxy_send_timeout 86400s;
    }

    # Django admin panel
    location /admin/ {
        set $django web:8000;
        proxy_pass http://$django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }

    # Django collected static files (admin CSS/JS etc.)
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # User uploaded media (images, videos, avatars)
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        # Ensure correct MIME types for video — nginx may not have these by default
        types {
            video/mp4   mp4;
            video/webm  webm;
        }
    }

    # Everything else → React app (frontend container)
    location / {
        set $frontend frontend:80;
        proxy_pass http://$frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_read_timeout    30s;
        # Prevent nginx from caching the frontend proxy responses
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }
}
