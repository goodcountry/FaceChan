# Federation test — Instance B
#
# Runs a full prod-equivalent FaceChan stack on non-standard ports so it
# can coexist with Instance A on the same machine.
#
# Usage (from the repo root — both instances need the same codebase):
#   docker compose -f test-federation/instance-b/docker-compose.yml -p fc-b up -d --build
#
# Ports exposed on the host:
#   8102 — nginx (HTTP, for curl/debug only — real access is via Tor)
#
# Your .onion address appears in the tor logs on first boot:
#   docker compose -f test-federation/instance-b/docker-compose.yml -p fc-b logs tor
#
# Set FEDERATION_BASE_URL in .env to that onion address once you have it.

services:
  db:
    image: postgres:16-alpine
    restart: always
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-facechan_b}
      POSTGRES_USER: ${POSTGRES_USER:-facechan_b}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in test-federation/instance-b/.env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-facechan_b}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  web:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: always
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 facechan.asgi:application"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    env_file: .env
    environment:
      DEBUG: "False"
      DATABASE_URL: postgres://${POSTGRES_USER:-facechan_b}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-facechan_b}
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      FEDERATION_SOCKS_PROXY: socks5h://tor-proxy:9150
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - internal

  celery:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: always
    command: celery -A facechan worker --loglevel=info
    volumes:
      - media_data:/app/media
    env_file: .env
    environment:
      DEBUG: "False"
      DATABASE_URL: postgres://${POSTGRES_USER:-facechan_b}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-facechan_b}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      FEDERATION_SOCKS_PROXY: socks5h://tor-proxy:9150
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal

  celerybeat:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: always
    command: celery -A facechan beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      DEBUG: "False"
      DATABASE_URL: postgres://${POSTGRES_USER:-facechan_b}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-facechan_b}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      FEDERATION_SOCKS_PROXY: socks5h://tor-proxy:9150
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      target: prod
    restart: always
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "8102:80"    # host:container — change 8102 if already in use
    volumes:
      - ../../nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    depends_on:
      - web
      - frontend
    networks:
      - internal

  tor:
    image: goldy/tor-hidden-service:latest
    restart: always
    links:
      - nginx
    environment:
      FACECHAN_TOR_SERVICE_HOSTS: "80:nginx:80"
      FACECHAN_TOR_SERVICE_VERSION: "3"
    volumes:
      - tor_keys:/var/lib/tor/hidden_service/
    networks:
      - internal

  # Dedicated OUTBOUND Tor SOCKS proxy. Separate from the inbound
  # hidden-service 'tor' container above: this one exposes a SOCKS
  # port on the internal network so web/celery can reach .onion
  # instances. It does not publish a hidden service.
  tor-proxy:
    image: peterdavehello/tor-socks-proxy:latest
    restart: always
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  media_data:
  static_data:
  tor_keys:
